name: Run web test for Applications in private

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Testing in Test environment'
        required: true
        default: 'test'

      test_scenario:
        description: 'Cucumber tags to run (e.g. @accordion_component or @button_component). Use "or" to combine multiple tags.'
        required: true
        default: '@testenv_run'
        type: string

      custom_test_scenario:
        description: '(Optional) Override the above selection with a custom tag expression'
        required: false
        default: ''
        type: string

      threads:
        description: 'Number of parallel threads (default 10)'
        required: false
        default: '10'
        type: string

jobs:
  run-web-test:
    runs-on: azu-ecs-self-hosted-linux

    environment: ${{ inputs.environment }}

    env:
      AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
      AWS_S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}

      Product_Master_EU_db_Username: ${{ secrets.Product_Master_EU_db_Username }}
      Product_Master_EU_db_Password: ${{ secrets.Product_Master_EU_db_Password }}

      PRODUCT_MASTER_APAC_DB_USERNAME: ${{ secrets.PRODUCT_MASTER_APAC_DB_USERNAME }}
      PRODUCT_MASTER_APAC_DB_PASSWORD: ${{ secrets.PRODUCT_MASTER_APAC_DB_PASSWORD }}

      PRID_EMAIL_ID: ${{ secrets.PRID_EMAIL_ID }}
      PRID_PASSWORD: ${{ secrets.PRID_PASSWORD }}

      VAULT_EMAIL_ID: ${{ secrets.VAULT_EMAIL_ID }}
      VAULT_PASSCODE: ${{ secrets.VAULT_PASSCODE }}

      AUTHENTICATOR_PASSCODE: ${{ secrets.AUTHENTICATOR_PASSCODE }}

      CRMURL: ${{ vars.CRMURL }}
      EMAIL_ID: ${{ vars.EMAIL_ID }}
      FXHUBTESTURL: ${{ vars.FXHUBTESTURL }}
      FXHUBURL: ${{ vars.FXHUBURL }}
      OUTLOOKURL: ${{ vars.OUTLOOKURL }}
      PRID: ${{ vars.PRID }}

      PRODUCT_MASTER_EU_DB_URL: ${{ vars.PRODUCT_MASTER_EU_DB_URL }}

      RELTIO_EU_BASEURL: ${{ vars.RELTIO_EU_BASEURL }}
      RELTIO_APAC_BASEURL: ${{ vars.RELTIO_APAC_BASEURL }}

      VAULTURL: ${{ vars.VAULTURL }}
      RELTIO_DBTYPE: ${{ vars.RELTIO_DBTYPE }}

    steps:

      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd
        with:
          chrome-version: 133

      - name: Verify Chrome Version
        run: chrome --version

      - name: Verify ChromeDriver
        run: |
          if command -v chromedriver > /dev/null; then
            echo "Chromedriver Version:"
            chromedriver -v
          else
            echo "Chromedriver is not installed."
          fi

      - name: Pull the project into the runner
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Set Environment Variable for Project Path
        run: |
          echo "PROJECT_PATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV
          echo "The project path is ${GITHUB_WORKSPACE}"

      - name: Set up Azul Zulu JDK 17
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Maven settings
        run: |
          mkdir -p ~/.m2
          cp .github/settings/settings.xml ~/.m2/settings.xml

      - name: Create Downloads folder
        run: |
          mkdir -p Downloads

      - name: Determine test scenario
        id: scenario
        run: |
          CUSTOM="${{ inputs.custom_test_scenario }}"

          if [ -n "$CUSTOM" ]; then
            echo "tags=$CUSTOM" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ inputs.test_scenario }}" >> $GITHUB_OUTPUT
          fi

      - name: Build (compile only)
        run: |
          mvn --settings ~/.m2/settings.xml clean test-compile \
            -Dproject.build.sourceEncoding=UTF-8 \
            -Dproject.reporting.outputEncoding=UTF-8 \
            -Dhttps.proxyHost=emeapzen.astrazeneca.net \
            -Dhttps.proxyPort=10263 \
            -Djavax.net.ssl.trustStore=${{ env.PROJECT_PATH }}/az-cacerts \
            -Djavax.net.ssl.trustStorePassword=changeit

      - name: Running web test
        id: test
        continue-on-error: true
        run: |
          mvn --settings ~/.m2/settings.xml -Pbs test \
            -Dproject.build.sourceEncoding=UTF-8 \
            -Dproject.reporting.outputEncoding=UTF-8 \
            -Dhttps.proxyHost=emeapzen.astrazeneca.net \
            -Dhttps.proxyPort=10263 \
            -Dhttp.nonProxyHosts=*.astrazeneca.net \
            -Djavax.net.ssl.trustStore=${{ env.PROJECT_PATH }}/az-cacerts \
            -Djavax.net.ssl.trustStorePassword=changeit \
            -Drp.enable=true \
            -Dthreads=${{ inputs.threads }} \
            -Dlog.trace=true \
            -Dprofile=src/test/resources/project/RELTIO/config/jenkins.properties \
            -Dcucumber.options="src/test/resources/project/RELTIO/" \
            -Dcucumber.filter.tags="${{ steps.scenario.outputs.tags }}"

      - name: Check test results
        if: steps.test.outcome == 'failure'
        run: |
          echo "::warning::Tests failed but build continued (UNSTABLE)"

      - name: Prepare Extent HTML report
        if: always()
        run: |
          mv *.png target/reports/extent/HtmlReport/ 2>/dev/null || true

          sed -i "s#[^']*\(embedded[0-9]*\.png\)#\1#g" \
          target/reports/extent/HtmlReport/ExtentHtml.html \
          2>/dev/null || true

      - name: Publish JUnit test summary
        if: always()
        run: |
          echo "## JUnit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL=0
          PASSED=0
          FAILED=0
          ERRORS=0
          SKIPPED=0

          for f in target/surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue

            t=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1)
            fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            e=$(grep -oP 'errors="\K[0-9]+' "$f" | head -1)
            s=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1)

            TOTAL=$((TOTAL + ${t:-0}))
            FAILED=$((FAILED + ${fa:-0}))
            ERRORS=$((ERRORS + ${e:-0}))
            SKIPPED=$((SKIPPED + ${s:-0}))
          done

          PASSED=$((TOTAL - FAILED - ERRORS - SKIPPED))

          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY

      - name: Uploading artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Test Automation Report
          path: |
            ${{ env.PROJECT_PATH }}/target/reports
            ${{ env.PROJECT_PATH }}/target/reports/cucumber.json
            ${{ env.PROJECT_PATH }}/target/automation.log
            ${{ env.PROJECT_PATH }}/target/chromedriver.log
            ${{ env.PROJECT_PATH }}/target/surefire-reports